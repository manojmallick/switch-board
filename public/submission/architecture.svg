<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#17322f"/>
    </marker>
    <style>
      .title{font-family:Arial,sans-serif;font-size:54px;font-weight:700;fill:#17322f}.sub{font-family:Arial,sans-serif;font-size:25px;font-weight:400;fill:#4b5f5a}
      .layer{font-family:Arial,sans-serif;font-size:25px;font-weight:700;fill:#17322f}.node{font-family:Arial,sans-serif;font-size:23px;font-weight:600;fill:#17322f}
      .small{font-family:Arial,sans-serif;font-size:19px;font-weight:400;fill:#4b5f5a}.box{stroke:#17322f;stroke-width:3;rx:20}
      .line{fill:none;stroke:#17322f;stroke-width:5;marker-end:url(#arrow)}
